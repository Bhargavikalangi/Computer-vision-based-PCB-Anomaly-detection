version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: pcb_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: pcb_detection
      POSTGRES_USER: pcb_user
      POSTGRES_PASSWORD: pcb_secure_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/database/migrations/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pcb_user -d pcb_detection"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pcb_backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://pcb_user:pcb_secure_pass@postgres:5432/pcb_detection
      MODEL_PATH: /app/models/pcb_detector.pt
      UPLOAD_DIR: /app/uploads
      SECRET_KEY: your-super-secret-key-change-in-production
      ENVIRONMENT: production
    volumes:
      - ./backend/models:/app/models
      - uploads_data:/app/uploads
      - results_data:/app/results
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: pcb_frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXT_PUBLIC_WS_URL: ws://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
  uploads_data:
  results_data:
